name: CLI CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'cli/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./cli
      run: npm install
    - name: Build check
      working-directory: ./cli
      run: node index.js --version
