name: Web CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./web
      run: npm install
    - name: Build
      working-directory: ./web
      run: npm run build
